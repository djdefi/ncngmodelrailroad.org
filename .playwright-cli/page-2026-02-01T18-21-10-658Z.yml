    - generic [ref=e26]:
      - paragraph [ref=e27]: The NCNG Historical Model Railroad is a historically accurate and operating scale model of the famous Nevada County Narrow Gauge Railroad. Located permanently in its own building on the Nevada County fairgrounds, the historical model railroad exhibit and display is open during major fairground events, special open houses, as well as by special arrangement with schools or visitors.
      - paragraph [ref=e28]:
        - text: The fully operational Historical Model Railroad is built to
        - strong [ref=e29]: "'On3' scale"
        - text: ", and has models of the three major towns served by the now gone NCNGRR –"
        - strong [ref=e30]: Nevada City
        - text: ","
        - strong [ref=e31]: Grass Valley
        - text: and
        - strong [ref=e32]: Colfax
        - text: as well as historic points in-between.
      - paragraph [ref=e34]:
        - text: The original railroad ran
        - strong [ref=e35]: 22 miles
        - text: from Nevada City, California, to the Southern Pacific mainline at Colfax, California, between
        - strong [ref=e36]: 1875 and 1942
        - text: .
    - generic [ref=e39]:
      - heading "Our History" [level=2] [ref=e40]
      - generic [ref=e41]:
        - paragraph [ref=e42]:
          - text: The NCNG Historical Model Railroad was incorporated in
          - strong [ref=e43]: "1986"
          - text: as the "N.C.N.G. Project" and has steadily been improved since then. The locomotives and rolling stock are historically accurate and fully operational.
        - paragraph [ref=e44]:
          - text: The DCC controlled trains now boast special features such as the
          - strong [ref=e45]: "'train cam television'"
          - text: where visitors get an 'on-the-train' view from the perspective of riding the railroad as it travels from town to town.
        - paragraph [ref=e46]:
          - text: The Historical Model Railroad is maintained and operated by the N.C.N.G. Historical Model Railroad (originally known as the "NCNG Project") – a
          - strong [ref=e47]: 501(c)(3) non-profit all volunteer organization
          - text: dedicated to maintaining and improving this Historical Model Railroad.
