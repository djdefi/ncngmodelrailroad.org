backend:
  name: github
  repo: djdefi/ncngmodelrailroad.org
  branch: main
  auth_type: pkce
  app_id: Ov23limOE86KsddBOuAe

media_folder: public/images
public_folder: /images

collections:
  - name: events
    label: Events
    folder: src/content/events
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{title}} — {{year}}/{{month}}/{{day}}"
    fields:
      - { name: title, label: Title, widget: string }
      - { name: date, label: Event Date, widget: datetime, date_format: YYYY-MM-DD, time_format: false }
      - { name: endDate, label: End Date (optional), widget: datetime, date_format: YYYY-MM-DD, time_format: false, required: false }
      - { name: location, label: Location, widget: string, default: "Nevada County Fairgrounds, Grass Valley" }
      - { name: description, label: Short Description, widget: text, required: false }
      - { name: featured, label: Featured on Homepage, widget: boolean, default: false }
      - { name: body, label: Details, widget: markdown }

  - name: board
    label: Board Members
    folder: src/content/board
    create: true
    slug: "{{slug}}"
    summary: "{{name}} — {{role}}"
    sortable_fields: [order, name, role]
    fields:
      - { name: name, label: Full Name, widget: string }
      - { name: role, label: Role/Title, widget: string }
      - { name: bio, label: Bio, widget: text }
      - { name: image, label: Photo, widget: image, media_folder: /public/images/board, public_folder: board }
      - { name: order, label: Display Order, widget: number, value_type: int, min: 1 }

  - name: gallery
    label: Photo Gallery
    folder: src/content/gallery
    create: true
    slug: "{{slug}}"
    summary: "{{title}} ({{category}})"
    fields:
      - { name: title, label: Alt Text / Title, widget: string }
      - { name: image, label: Photo, widget: image }
      - { name: caption, label: Caption, widget: string }
      - { name: category, label: Category, widget: select, options: ["Historic", "Layout", "Events"] }

  - name: trains
    label: Engine Roster
    folder: src/content/trains
    create: true
    slug: "engine-{{fields.order}}"
    summary: "{{number}} {{name}} ({{wheel}})"
    sortable_fields: [order, number]
    fields:
      - { name: number, label: "Engine Number", widget: string }
      - { name: name, label: "Engine Name", widget: string, hint: 'Use "—" if unnamed' }
      - { name: wheel, label: Wheel Arrangement, widget: string, hint: "e.g. 4-4-0, 2-6-0" }
      - { name: notes, label: Notes, widget: text }
      - { name: order, label: Display Order, widget: number, value_type: int, min: 1 }
