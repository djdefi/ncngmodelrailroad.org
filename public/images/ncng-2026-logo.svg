<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&amp;display=swap');
      .heading { font-family: 'Archivo Black', 'Georgia', serif; }
      .body { font-family: 'Georgia', serif; }
    </style>
  </defs>

  <!-- Outer ring -->
  <circle cx="300" cy="300" r="290" fill="none" stroke="#8B0000" stroke-width="8"/>
  <circle cx="300" cy="300" r="274" fill="none" stroke="#B8860B" stroke-width="2"/>
  <circle cx="300" cy="300" r="268" fill="#FDFBF7"/>

  <!-- Inner dark band for curved text -->
  <circle cx="300" cy="300" r="268" fill="none" stroke="#8B0000" stroke-width="44"/>
  <circle cx="300" cy="300" r="246" fill="#FDFBF7"/>
  <circle cx="300" cy="300" r="246" fill="none" stroke="#B8860B" stroke-width="1.5"/>

  <!-- Curved text paths -->
  <path id="topArc" d="M 80,300 a 220,220 0 0,1 440,0" fill="none"/>
  <path id="bottomArc" d="M 100,300 a 200,200 0 0,0 400,0" fill="none"/>

  <!-- Top curved text -->
  <text class="body" fill="#FDFBF7" font-size="18" letter-spacing="4" font-weight="bold">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">NEVADA COUNTY NARROW GAUGE</textPath>
  </text>

  <!-- Bottom curved text -->
  <text class="body" fill="#FDFBF7" font-size="16" letter-spacing="3" font-weight="bold">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">HISTORICAL MODEL RAILROAD</textPath>
  </text>

  <!-- Small stars/dots as dividers on the ring -->
  <circle cx="82" cy="280" r="4" fill="#B8860B"/>
  <circle cx="518" cy="280" r="4" fill="#B8860B"/>
  <circle cx="95" cy="330" r="4" fill="#B8860B"/>
  <circle cx="505" cy="330" r="4" fill="#B8860B"/>

  <!-- Sierra Nevada mountain backdrop -->
  <g fill="#2E5A3A" opacity="0.15">
    <polygon points="120,340 200,240 280,340"/>
    <polygon points="220,340 320,210 420,340"/>
    <polygon points="340,340 430,250 520,340"/>
  </g>

  <!-- Pine trees silhouettes -->
  <g fill="#2E5A3A" opacity="0.3">
    <!-- Left trees -->
    <polygon points="135,380 142,310 149,380"/>
    <polygon points="155,385 164,320 173,385"/>
    <!-- Right trees -->
    <polygon points="435,380 442,315 449,380"/>
    <polygon points="458,385 466,325 474,385"/>
  </g>

  <!-- Trestle bridge -->
  <g stroke="#8B4513" stroke-width="2.5" fill="none" opacity="0.6">
    <!-- Bridge deck -->
    <line x1="160" y1="388" x2="440" y2="388"/>
    <line x1="160" y1="392" x2="440" y2="392"/>
    <!-- Vertical supports -->
    <line x1="200" y1="392" x2="200" y2="440"/>
    <line x1="250" y1="392" x2="250" y2="440"/>
    <line x1="300" y1="392" x2="300" y2="450"/>
    <line x1="350" y1="392" x2="350" y2="440"/>
    <line x1="400" y1="392" x2="400" y2="440"/>
    <!-- Cross bracing -->
    <line x1="200" y1="392" x2="250" y2="440"/>
    <line x1="250" y1="392" x2="200" y2="440"/>
    <line x1="250" y1="392" x2="300" y2="450"/>
    <line x1="300" y1="392" x2="250" y2="440"/>
    <line x1="300" y1="392" x2="350" y2="440"/>
    <line x1="350" y1="392" x2="300" y2="450"/>
    <line x1="350" y1="392" x2="400" y2="440"/>
    <line x1="400" y1="392" x2="350" y2="440"/>
  </g>

  <!-- Steam locomotive silhouette on bridge -->
  <g transform="translate(270, 358)" fill="#1A1A1A">
    <!-- Boiler -->
    <rect x="0" y="8" width="60" height="22" rx="4"/>
    <!-- Cab -->
    <rect x="55" y="0" width="24" height="30" rx="2"/>
    <rect x="57" y="4" width="8" height="8" rx="1" fill="#FDFBF7" opacity="0.3"/>
    <rect x="67" y="4" width="8" height="8" rx="1" fill="#FDFBF7" opacity="0.3"/>
    <!-- Smokestack -->
    <rect x="6" y="0" width="10" height="10" rx="1"/>
    <rect x="3" y="-3" width="16" height="5" rx="2"/>
    <!-- Headlight -->
    <circle cx="2" cy="14" r="4" fill="#B8860B"/>
    <!-- Cowcatcher -->
    <polygon points="-8,30 0,22 0,30" fill="#1A1A1A"/>
    <!-- Wheels -->
    <circle cx="14" cy="32" r="6" fill="#1A1A1A" stroke="#B8860B" stroke-width="1"/>
    <circle cx="32" cy="32" r="6" fill="#1A1A1A" stroke="#B8860B" stroke-width="1"/>
    <circle cx="50" cy="32" r="6" fill="#1A1A1A" stroke="#B8860B" stroke-width="1"/>
    <circle cx="68" cy="32" r="6" fill="#1A1A1A" stroke="#B8860B" stroke-width="1"/>
    <!-- Steam puff -->
    <circle cx="8" cy="-8" r="5" fill="#999" opacity="0.3"/>
    <circle cx="16" cy="-14" r="7" fill="#999" opacity="0.2"/>
    <circle cx="26" cy="-18" r="6" fill="#999" opacity="0.1"/>
  </g>

  <!-- Narrow gauge track lines below bridge -->
  <g stroke="#8B4513" stroke-width="1" opacity="0.4">
    <line x1="140" y1="455" x2="460" y2="455"/>
    <line x1="140" y1="458" x2="460" y2="458"/>
    <!-- Ties -->
    <line x1="160" y1="453" x2="160" y2="460"/><line x1="175" y1="453" x2="175" y2="460"/>
    <line x1="190" y1="453" x2="190" y2="460"/><line x1="205" y1="453" x2="205" y2="460"/>
    <line x1="220" y1="453" x2="220" y2="460"/><line x1="235" y1="453" x2="235" y2="460"/>
    <line x1="250" y1="453" x2="250" y2="460"/><line x1="265" y1="453" x2="265" y2="460"/>
    <line x1="280" y1="453" x2="280" y2="460"/><line x1="295" y1="453" x2="295" y2="460"/>
    <line x1="310" y1="453" x2="310" y2="460"/><line x1="325" y1="453" x2="325" y2="460"/>
    <line x1="340" y1="453" x2="340" y2="460"/><line x1="355" y1="453" x2="355" y2="460"/>
    <line x1="370" y1="453" x2="370" y2="460"/><line x1="385" y1="453" x2="385" y2="460"/>
    <line x1="400" y1="453" x2="400" y2="460"/><line x1="415" y1="453" x2="415" y2="460"/>
    <line x1="430" y1="453" x2="430" y2="460"/><line x1="445" y1="453" x2="445" y2="460"/>
  </g>

  <!-- Central text: N.C.N.G. -->
  <text x="300" y="210" text-anchor="middle" class="heading" font-size="62" fill="#8B0000" font-weight="900" letter-spacing="3">N.C.N.G.</text>

  <!-- Decorative line under NCNG -->
  <line x1="180" y1="222" x2="420" y2="222" stroke="#B8860B" stroke-width="2"/>
  <circle cx="180" cy="222" r="3" fill="#B8860B"/>
  <circle cx="420" cy="222" r="3" fill="#B8860B"/>

  <!-- Subtitle -->
  <text x="300" y="252" text-anchor="middle" class="body" font-size="15" fill="#1A1A1A" letter-spacing="5" font-weight="bold">ON3 SCALE</text>

  <!-- Location line -->
  <text x="300" y="280" text-anchor="middle" class="body" font-size="12" fill="#666" letter-spacing="2">GRASS VALLEY, CALIFORNIA</text>

  <!-- Est. and dates at bottom center -->
  <text x="300" y="492" text-anchor="middle" class="body" font-size="13" fill="#8B0000" letter-spacing="2" font-weight="bold">EST. 1986</text>

  <!-- Railroad heritage dates -->
  <text x="300" y="510" text-anchor="middle" class="body" font-size="10" fill="#666" letter-spacing="1.5">PRESERVING THE LEGACY OF THE N.C.N.G.R.R. (1875–1942)</text>

  <!-- Gold spike accents at bottom -->
  <g fill="#B8860B" transform="translate(300,530)">
    <!-- Crossed rail spikes -->
    <rect x="-20" y="-8" width="3" height="20" rx="1" transform="rotate(-30)"/>
    <rect x="17" y="-8" width="3" height="20" rx="1" transform="rotate(30)"/>
    <circle cx="0" cy="0" r="4"/>
  </g>
</svg>
